<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a" />
      <stop offset="100%" stop-color="#14142f" />
    </linearGradient>
    <!-- Glow Effect filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="180" height="180" rx="44" fill="url(#bgGrad)" stroke="#222244" stroke-width="2" />
  
  <!-- Outer glowing ring -->
  <circle cx="90" cy="90" r="64" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" opacity="0.2" filter="url(#glow)" />
  <circle cx="90" cy="90" r="64" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="12 8" stroke-linecap="round" />

  <!-- Stylized Goal / Football Icon in the center -->
  <circle cx="90" cy="90" r="38" fill="#181838" stroke="url(#primaryGrad)" stroke-width="4" />
  <circle cx="90" cy="90" r="22" stroke="url(#primaryGrad)" stroke-width="3" opacity="0.6" />
  
  <!-- Center Goal Pin / Flag -->
  <path d="M90 56V92" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <path d="M90 58L114 69L90 80" fill="url(#primaryGrad)" />
  <circle cx="90" cy="90" r="6" fill="#ffffff" />
</svg>